# Workflow: Vercel Production Deployment
# Branch: main
# Purpose: Deploy production site to Vercel
# Triggers: Push to main branch
# Dependencies: Vercel CLI, pnpm, Node.js 23

name: Vercel Production Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  production:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: production
      url: https://horaciolaphitz.vercel.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 23
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pre-build validation
        run: |
          echo "🔍 Validating file sizes..."
          node scripts/validate-file-sizes.mjs
          echo "✅ Validation completed"

      - name: Run tests
        run: pnpm test:run

      - name: Type check
        run: pnpm astro check

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.PUBLIC_WEB3FORMS_ACCESS_KEY }}
          NODE_ENV: production

      - name: Validate build output
        run: |
          echo "🔍 Validating build output..."
          if [ ! -d ".vercel/output" ]; then
            echo "❌ Build directory not found"
            exit 1
          fi
          echo "✅ Build output validated"

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "✅ Production deployed to: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deployment summary
        run: |
          echo "✅ Production deployment completed successfully"
          echo "🌐 Production URL: ${{ steps.deploy.outputs.url }}"
          echo "📦 Commit: ${{ github.sha }}"
          echo "👤 Deployed by: ${{ github.actor }}"
