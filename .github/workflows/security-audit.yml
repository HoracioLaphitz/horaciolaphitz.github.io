# ============================================================================
# SECURITY AUDIT WORKFLOW
# ============================================================================
# Automated security scanning for vulnerabilities in dependencies and code
#
# Triggers:
# - Push to main/develop branches (continuous monitoring)
# - Pull requests to main (gate before merge)
# - Manual dispatch (on-demand audits)
#
# Jobs:
# 1. Frontend Audit: npm dependencies (pnpm audit)
# 2. Backend Audit: Python dependencies (pip-audit)
# 3. SAST Scan: Static code analysis (bandit)
#
# Failure Policy:
# - HIGH/CRITICAL vulnerabilities FAIL the pipeline
# - Audit reports uploaded as artifacts for review
# - Security team notified on failures (future enhancement)
# ============================================================================

name: Security Audit

on:
  # Continuous monitoring on main branches
  push:
    branches:
      - main
      - develop

  # Gate for pull requests
  pull_request:
    branches:
      - main

  # Manual trigger for on-demand audits
  workflow_dispatch:

# Prevent concurrent runs on same branch
concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # FRONTEND SECURITY AUDIT (npm/pnpm)
  # ============================================================================
  # Scans JavaScript/TypeScript dependencies for known vulnerabilities
  # Uses pnpm audit which checks against npm advisory database
  #
  # Severity Levels:
  # - INFO: Informational only
  # - LOW: Minor issues, no immediate action
  # - MODERATE: Should be fixed soon
  # - HIGH: Fix ASAP (FAILS pipeline)
  # - CRITICAL: Fix immediately (FAILS pipeline)

  frontend-audit:
    name: Frontend Dependencies Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        id: npm-audit
        # continue-on-error: false means HIGH/CRITICAL vulnerabilities FAIL the job
        continue-on-error: false
        run: |
          echo "Running pnpm audit with HIGH severity threshold..."
          pnpm audit --audit-level=high --json > npm-audit-report.json || true

          # Display human-readable report
          echo "=== NPM Audit Report ==="
          pnpm audit --audit-level=high || true

          # Check if there are HIGH or CRITICAL vulnerabilities
          if pnpm audit --audit-level=high; then
            echo "✅ No HIGH or CRITICAL vulnerabilities found"
            exit 0
          else
            echo "❌ HIGH or CRITICAL vulnerabilities detected"
            exit 1
          fi

      - name: Upload audit report
        # Always upload report, even on failure, for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

  # ============================================================================
  # BACKEND SECURITY AUDIT (Python/pip)
  # ============================================================================
  # Scans Python dependencies for known vulnerabilities
  # Uses pip-audit which checks against PyPI advisory database
  #
  # Scope:
  # - Checks requirements.txt for production dependencies
  # - Validates against CVE database
  # - Reports vulnerable package versions

  backend-audit:
    name: Backend Dependencies Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Check if requirements.txt exists
        id: check-requirements
        run: |
          if [ -f "requirements.txt" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ No requirements.txt found, skipping Python audit"
          fi

      - name: Run pip-audit
        if: steps.check-requirements.outputs.exists == 'true'
        id: pip-audit
        # continue-on-error: false means vulnerabilities FAIL the job
        continue-on-error: false
        run: |
          echo "Running pip-audit on requirements.txt..."
          pip-audit -r requirements.txt --format json --output pip-audit-report.json || true

          # Display human-readable report
          echo "=== Pip Audit Report ==="
          pip-audit -r requirements.txt || true

          # Check exit code
          if pip-audit -r requirements.txt; then
            echo "✅ No vulnerabilities found in Python dependencies"
            exit 0
          else
            echo "❌ Vulnerabilities detected in Python dependencies"
            exit 1
          fi

      - name: Upload audit report
        if: always() && steps.check-requirements.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

  # ============================================================================
  # SAST SCANNING (Static Application Security Testing)
  # ============================================================================
  # Static code analysis to detect security issues in source code
  # Uses Bandit for Python code scanning
  #
  # Checks for:
  # - Hardcoded passwords/secrets
  # - SQL injection vulnerabilities
  # - Command injection risks
  # - Insecure cryptography usage
  # - Path traversal vulnerabilities
  #
  # Severity Levels:
  # - LOW: Informational
  # - MEDIUM: Should review
  # - HIGH: Fix ASAP (FAILS pipeline)

  sast-scan:
    name: SAST Code Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]

      - name: Check if Python code exists
        id: check-python
        run: |
          if [ -d "src/api/python" ] || find . -name "*.py" -not -path "./node_modules/*" -not -path "./.venv/*" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ No Python code found, skipping SAST scan"
          fi

      - name: Run Bandit SAST scan
        if: steps.check-python.outputs.exists == 'true'
        id: bandit-scan
        # continue-on-error: false means HIGH severity issues FAIL the job
        continue-on-error: false
        run: |
          echo "Running Bandit SAST scan..."

          # Scan Python files, exclude common directories
          bandit -r . \
            --exclude ./node_modules,./dist,./build,./.venv,./venv \
            --severity-level high \
            --format json \
            --output bandit-report.json || true

          # Display human-readable report
          echo "=== Bandit SAST Report ==="
          bandit -r . \
            --exclude ./node_modules,./dist,./build,./.venv,./venv \
            --severity-level high || true

          # Check exit code
          if bandit -r . --exclude ./node_modules,./dist,./build,./.venv,./venv --severity-level high; then
            echo "✅ No HIGH severity security issues found"
            exit 0
          else
            echo "❌ HIGH severity security issues detected"
            exit 1
          fi

      - name: Upload SAST report
        if: always() && steps.check-python.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: bandit-report.json
          retention-days: 30

  # ============================================================================
  # AUDIT SUMMARY
  # ============================================================================
  # Aggregates results from all audit jobs
  # Provides single pass/fail status for the entire security audit

  audit-summary:
    name: Security Audit Summary
    runs-on: ubuntu-latest
    needs: [frontend-audit, backend-audit, sast-scan]
    if: always()

    steps:
      - name: Check audit results
        run: |
          echo "=== Security Audit Summary ==="
          echo ""
          echo "Frontend Audit: ${{ needs.frontend-audit.result }}"
          echo "Backend Audit: ${{ needs.backend-audit.result }}"
          echo "SAST Scan: ${{ needs.sast-scan.result }}"
          echo ""

          if [ "${{ needs.frontend-audit.result }}" == "failure" ] || \
             [ "${{ needs.backend-audit.result }}" == "failure" ] || \
             [ "${{ needs.sast-scan.result }}" == "failure" ]; then
            echo "❌ Security audit FAILED"
            echo "Review the audit reports in the artifacts section"
            exit 1
          else
            echo "✅ Security audit PASSED"
            exit 0
          fi

# ============================================================================
# WORKFLOW NOTES
# ============================================================================
#
# Reviewing Audit Failures:
# 1. Download audit reports from workflow artifacts
# 2. Review vulnerability details and severity
# 3. Check if patches/updates are available
# 4. Update dependencies or apply fixes
# 5. Re-run audit to verify fixes
#
# False Positives:
# - If a vulnerability is a false positive, document in security policy
# - Consider using audit ignore files (npm: .npmrc, pip: pip-audit.toml)
# - Always document why a vulnerability is ignored
#
# Emergency Bypasses:
# - If audit blocks critical deployment, can temporarily set continue-on-error: true
# - MUST create issue to fix vulnerabilities ASAP
# - MUST notify security team
#
# Maintenance:
# - Review and update severity thresholds quarterly
# - Update scanning tools (pip-audit, bandit) regularly
# - Add new scanners as needed (e.g., Snyk, Trivy)
#
# ============================================================================
# Last updated: 2026-05-15
# Review frequency: Quarterly or when security requirements change
# ============================================================================
