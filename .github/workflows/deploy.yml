# Workflow: Deploy to GitHub Pages
# Branch: main
# Purpose: Build and deploy portfolio to GitHub Pages with Node.js 23
# Triggers: Push to main branch
# Dependencies: pnpm, Node.js 23, Astro
# Outputs: Static site deployed to GitHub Pages

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deployment
  cancel-in-progress: false

jobs:
  build:
    name: Build Portfolio
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1
          clean: true

      - name: Setup Node.js 23
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pre-build validation
        run: |
          echo "🔍 Validating file sizes..."
          node scripts/validate-file-sizes.mjs
          echo "✅ Validation completed"

      - name: Build Astro site
        run: pnpm run build
        env:
          PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.PUBLIC_WEB3FORMS_ACCESS_KEY }}
          NODE_ENV: production

      - name: Validate build output
        run: |
          echo "🔍 Validating build output..."
          node scripts/validate-file-sizes.mjs dist
          if [ ! -d "dist" ]; then
            echo "❌ Build directory not found"
            exit 1
          fi
          echo "✅ Build output validated"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully"
          echo "🌐 Site URL: ${{ steps.deployment.outputs.page_url }}"
