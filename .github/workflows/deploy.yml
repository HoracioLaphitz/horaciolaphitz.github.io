name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ============================================================================
  # VALIDATION JOB
  # ============================================================================
  # Pre-deployment validation to catch issues before build
  # Runs TypeScript checks and tests
  # If validation fails, deployment is blocked

  validate:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type checking
        run: |
          echo "🔍 Running TypeScript type checking..."
          pnpm astro check
          echo "✅ TypeScript validation passed"

      - name: Run tests
        run: |
          echo "🧪 Running test suite..."
          pnpm test:run
          echo "✅ Tests passed"

  # ============================================================================
  # BUILD JOB
  # ============================================================================
  # Builds the Astro site for deployment
  # Includes build preparation and metadata generation

  build:
    name: Build Site
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare build
        run: |
          echo "📦 Preparing build..."
          node scripts/prepare-build.mjs
          echo "✅ Build preparation completed"

      - name: Build site
        run: |
          echo "🏗️ Building Astro site..."
          pnpm build
          echo "✅ Build completed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build output
        run: |
          echo "🔍 Verifying build output..."
          if [ ! -d "./dist" ]; then
            echo "❌ dist/ directory not found"
            exit 1
          fi
          if [ ! -f "./dist/index.html" ]; then
            echo "❌ index.html not found in dist/"
            exit 1
          fi
          echo "✅ Build output verified"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ============================================================================
  # DEPLOY JOB
  # ============================================================================
  # Deploys the built site to GitHub Pages
  # Only runs if validation and build succeed

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
