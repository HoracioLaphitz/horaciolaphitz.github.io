# Workflow: Branch Validation
# Purpose: Validate branch naming conventions and structure
# Triggers: Push to any branch, PR creation
# Dependencies: None
# Outputs: Validation report

name: Branch Validation

on:
  push:
    branches-ignore:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate-branch:
    name: Validate Branch Name
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Extract branch name
        id: extract_branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH_NAME="$HEAD_REF"
          else
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          fi
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "Branch name: $BRANCH_NAME"

      - name: Validate branch naming
        run: |
          BRANCH="${{ steps.extract_branch.outputs.branch }}"

          echo "🔍 Validating branch name: $BRANCH"

          # Valid patterns
          VALID_PATTERNS=(
            "^feature/.+"
            "^bugfix/.+"
            "^hotfix/.+"
            "^release/v[0-9]+\.[0-9]+\.[0-9]+$"
          )

          VALID=false
          for pattern in "${VALID_PATTERNS[@]}"; do
            if [[ $BRANCH =~ $pattern ]]; then
              VALID=true
              echo "✅ Branch name matches pattern: $pattern"
              break
            fi
          done

          if [ "$VALID" = false ]; then
            echo ""
            echo "❌ Invalid branch name: $BRANCH"
            echo ""
            echo "Valid branch naming conventions:"
            echo "  - feature/feature-name"
            echo "  - bugfix/bug-description"
            echo "  - hotfix/critical-fix"
            echo "  - release/v1.0.0"
            echo ""
            echo "See .github/BRANCH_STRATEGY.md for details"
            exit 1
          fi

          echo "✅ Branch name is valid"

      - name: Validation summary
        if: always()
        run: |
          echo "## Branch Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ steps.extract_branch.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ✅ Valid" >> $GITHUB_STEP_SUMMARY
